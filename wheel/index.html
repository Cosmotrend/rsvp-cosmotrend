<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roue de la Fortune — Semilac Days 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body style="min-height:100dvh;background:#0a0a14;overflow-x:hidden;">

  <!-- Background glows -->
  <div aria-hidden="true" style="position:fixed;inset:0;pointer-events:none;z-index:0;">
    <div style="position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(236,0,140,0.07) 0%,transparent 70%);"></div>
    <div style="position:absolute;bottom:-15%;right:-10%;width:500px;height:400px;background:radial-gradient(ellipse,rgba(232,201,126,0.05) 0%,transparent 70%);"></div>
  </div>

  <main style="position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 48px;">

    <!-- Logo / title -->
    <div class="animate-fade-up" style="text-align:center;margin-bottom:40px;">
      <p style="font-size:10px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:rgba(232,201,126,0.5);margin-bottom:10px;">Semilac Days 2026</p>
      <h1 style="font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(32px,6vw,46px);font-weight:300;color:#f5edd8;line-height:1.1;margin-bottom:6px;">
        Roue de la <em style="font-style:italic;">Fortune</em>
      </h1>
      <div class="divider-gold" style="margin:12px auto 0;max-width:160px;"></div>
    </div>

    <div style="width:100%;max-width:460px;">

      <!-- === LOGIN VIEW === -->
      <div id="v-login" class="card-premium animate-fade-up delay-2" style="padding:40px 32px;text-align:center;">
        <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,rgba(236,0,140,0.15),rgba(236,0,140,0.05));border:1px solid rgba(236,0,140,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ec008c" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:#f5edd8;margin-bottom:8px;">Entrez votre code billet</h2>
        <p style="font-size:12px;color:rgba(240,232,213,0.4);margin-bottom:28px;letter-spacing:0.04em;">Format : SD26-XXXX</p>

        <div class="field-wrap" style="margin-bottom:8px;">
          <input
            id="code-input"
            class="field-input filled"
            type="text"
            maxlength="9"
            placeholder="SD26-____"
            style="text-align:center;font-family:'Courier New',monospace;font-size:20px;font-weight:700;letter-spacing:0.15em;padding:16px;text-transform:uppercase;"
            oninput="onCodeInput()"
          />
        </div>
        <p id="code-error" style="display:none;font-size:11px;color:rgba(236,0,140,0.75);margin-bottom:16px;letter-spacing:0.04em;"></p>

        <button id="btn-validate" class="btn-gold" style="width:100%;margin-top:12px;" onclick="validate()" disabled>
          Valider le code
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      <!-- === LOADING VIEW === -->
      <div id="v-load" style="display:none;text-align:center;padding:80px 40px;">
        <div class="spinner" style="margin:0 auto 20px;"></div>
        <p style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(240,232,213,0.35);">Vérification…</p>
      </div>

      <!-- === WHEEL VIEW === -->
      <div id="v-wheel" style="display:none;" class="card-premium">
        <div style="padding:28px 28px 32px;text-align:center;">
          <!-- Greeting + tries -->
          <p id="wheel-greeting" style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(240,232,213,0.35);margin-bottom:10px;"></p>
          <div id="tries-dots" style="display:flex;justify-content:center;gap:8px;margin-bottom:24px;"></div>

          <!-- Wheel container -->
          <div style="position:relative;display:inline-block;margin-bottom:24px;">
            <!-- Pointer -->
            <div style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);z-index:10;width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:20px solid #e8c97e;filter:drop-shadow(0 2px 8px rgba(232,201,126,0.6));"></div>
            <!-- Outer ring glow -->
            <div style="position:absolute;inset:-8px;border-radius:50%;background:conic-gradient(from 0deg,#e8c97e,#ec008c,#e8c97e,#ec008c,#e8c97e);opacity:0.15;filter:blur(6px);"></div>
            <!-- Canvas -->
            <canvas id="wheel-canvas" style="display:block;border-radius:50%;position:relative;z-index:1;"></canvas>
            <!-- Center hub -->
            <div id="wheel-hub" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#2a0a50,#1a0530);border:2px solid rgba(232,201,126,0.4);z-index:5;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(232,201,126,0.2);">
              <div style="width:10px;height:10px;border-radius:50%;background:#e8c97e;"></div>
            </div>
          </div>

          <button id="btn-spin" class="btn-gold" style="width:100%;font-size:13px;padding:16px 28px;" onclick="spin()">
            Tourner la roue !
          </button>
        </div>
      </div>

      <!-- === RESULT VIEW === -->
      <div id="v-result" style="display:none;" class="card-premium">
        <div style="padding:48px 32px;text-align:center;">
          <!-- Prize ring -->
          <div style="position:relative;width:140px;height:140px;margin:0 auto 28px;">
            <div style="position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,#c2006e,#ff3dab,#ec008c,#c2006e);opacity:0.15;filter:blur(8px);"></div>
            <div style="width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,#1e0840,#2d1060);border:2px solid rgba(236,0,140,0.3);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(236,0,140,0.2);position:relative;">
              <span id="result-label" style="font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:600;color:#fff;line-height:1;"></span>
              <span style="font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-top:2px;">GAGNÉ</span>
            </div>
          </div>

          <h2 style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:#f5edd8;margin-bottom:8px;">Félicitations !</h2>
          <p id="result-desc" style="font-size:14px;color:rgba(240,232,213,0.6);margin-bottom:6px;"></p>
          <p id="result-code" style="font-family:'Courier New',monospace;font-size:13px;font-weight:700;letter-spacing:0.15em;color:#e8c97e;margin-bottom:28px;"></p>

          <div class="divider-gold" style="margin-bottom:24px;"></div>

          <button id="btn-retry" class="btn-gold" style="width:100%;margin-bottom:12px;display:none;" onclick="retry()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
            2ème essai
          </button>
          <button class="btn-ghost" style="width:100%;font-size:11px;" onclick="backToLogin()">Utiliser un autre billet</button>
        </div>
      </div>

      <!-- === BLOCKED VIEW === -->
      <div id="v-block" style="display:none;" class="card-premium">
        <div style="padding:48px 32px;text-align:center;">
          <div style="width:64px;height:64px;border-radius:50%;background:rgba(236,0,140,0.06);border:1px solid rgba(236,0,140,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(236,0,140,0.6)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
          </div>
          <h2 style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:#f5edd8;margin-bottom:8px;">Limite atteinte</h2>
          <p style="font-size:13px;color:rgba(240,232,213,0.4);line-height:1.7;margin-bottom:28px;">Ce billet a déjà utilisé ses 2 essais.<br>Bonne chance pour la prochaine fois !</p>
          <button class="btn-ghost" style="width:100%;" onclick="backToLogin()">Utiliser un autre billet</button>
        </div>
      </div>

    </div>

    <footer style="margin-top:40px;text-align:center;">
      <p style="font-size:11px;letter-spacing:0.08em;color:rgba(240,232,213,0.18);text-transform:uppercase;">Cosmotrend &nbsp;·&nbsp; Casablanca</p>
    </footer>
  </main>

  <script>
    const MAX = 2;
    const N = 16;
    const ARC = 360 / N;

    const PALETTE = [
      { label: "-25%", desc: "-25% sur votre commande", light: "#ff2da8", dark: "#b8005e" },
      { label: "-30%", desc: "-30% sur votre commande", light: "#d4006e", dark: "#8c0048" },
      { label: "-35%", desc: "-35% sur votre commande", light: "#9c0050", dark: "#640030" },
      { label: "-40%", desc: "-40% sur votre commande", light: "#720038", dark: "#420020" },
    ];

    const SEGMENTS = Array.from({ length: N }, (_, i) => PALETTE[i % PALETTE.length]);

    const VIEWS = ["v-login","v-load","v-wheel","v-result","v-block"];
    function showView(id) {
      VIEWS.forEach(v => {
        document.getElementById(v).style.display = v === id ? '' : 'none';
      });
    }

    const getT = c => parseInt(localStorage.getItem("whl_" + c) || "0");
    const setT = (c, n) => localStorage.setItem("whl_" + c, String(n));

    let currentCode = "";
    let rotation = 0;
    let spinning = false;
    let SIZE = 300;
    let DPR = window.devicePixelRatio || 1;

    // ---- Code Input ----
    function onCodeInput() {
      const input = document.getElementById('code-input');
      let val = input.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
      input.value = val;
      const valid = /^SD26-\d{4}$/.test(val);
      document.getElementById('btn-validate').disabled = !valid;
      document.getElementById('code-error').style.display = 'none';
    }

    function validate() {
      const code = document.getElementById('code-input').value.toUpperCase().trim();
      if (!/^SD26-\d{4}$/.test(code)) return;

      currentCode = code;
      showView('v-load');

      setTimeout(() => {
        const tries = getT(code);
        if (tries >= MAX) {
          showView('v-block');
        } else {
          initWheel(code, tries);
          showView('v-wheel');
        }
      }, 520);
    }

    // ---- Wheel Init ----
    function initWheel(code, tries) {
      document.getElementById('wheel-greeting').textContent = "Bonne chance — " + code;
      renderDots(tries);
      initCanvas();
      draw(0);
      document.getElementById('btn-spin').disabled = false;
    }

    function renderDots(tries) {
      const wrap = document.getElementById('tries-dots');
      wrap.innerHTML = '';
      for (let i = 0; i < MAX; i++) {
        const dot = document.createElement('div');
        dot.style.cssText = `
          width:10px;height:10px;border-radius:50%;
          transition:all 0.3s ease;
          ${i < tries
            ? 'background:rgba(240,232,213,0.15);border:1px solid rgba(240,232,213,0.15);'
            : 'background:linear-gradient(135deg,#ec008c,#ff3dab);box-shadow:0 0 8px rgba(236,0,140,0.5);'}
        `;
        wrap.appendChild(dot);
      }
    }

    function initCanvas() {
      const canvas = document.getElementById('wheel-canvas');
      const containerW = Math.min(window.innerWidth - 80, 320);
      SIZE = containerW;
      DPR = window.devicePixelRatio || 1;
      canvas.width = SIZE * DPR;
      canvas.height = SIZE * DPR;
      canvas.style.width = SIZE + 'px';
      canvas.style.height = SIZE + 'px';
    }

    function draw(rotDeg) {
      const canvas = document.getElementById('wheel-canvas');
      const ctx = canvas.getContext('2d');
      ctx.save();
      ctx.scale(DPR, DPR);
      ctx.clearRect(0, 0, SIZE, SIZE);

      const cx = SIZE / 2, cy = SIZE / 2, r = SIZE / 2 - 4;
      const rotRad = (rotDeg - 90) * Math.PI / 180;

      // Draw segments
      for (let i = 0; i < N; i++) {
        const startAngle = rotRad + (i * ARC) * Math.PI / 180;
        const endAngle = rotRad + ((i + 1) * ARC) * Math.PI / 180;
        const seg = SEGMENTS[i];

        // Gradient fill
        const mid = rotRad + (i + 0.5) * ARC * Math.PI / 180;
        const gx1 = cx + (r * 0.3) * Math.cos(mid);
        const gy1 = cy + (r * 0.3) * Math.sin(mid);
        const gx2 = cx + r * Math.cos(mid);
        const gy2 = cy + r * Math.sin(mid);
        const grad = ctx.createLinearGradient(gx1, gy1, gx2, gy2);
        grad.addColorStop(0, seg.light);
        grad.addColorStop(1, seg.dark);

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // Divider lines
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + r * Math.cos(startAngle), cy + r * Math.sin(startAngle));
        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
        ctx.lineWidth = 1.2;
        ctx.stroke();
      }

      // Outer ring
      const ringGrad = ctx.createLinearGradient(0, 0, SIZE, SIZE);
      ringGrad.addColorStop(0, 'rgba(232,201,126,0.7)');
      ringGrad.addColorStop(0.5, 'rgba(236,0,140,0.5)');
      ringGrad.addColorStop(1, 'rgba(232,201,126,0.7)');
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = ringGrad;
      ctx.lineWidth = 3;
      ctx.stroke();

      // Inner shadow ring
      ctx.beginPath();
      ctx.arc(cx, cy, r - 6, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 8;
      ctx.stroke();

      // Labels
      ctx.save();
      for (let i = 0; i < N; i++) {
        const midAngle = rotRad + (i + 0.5) * ARC * Math.PI / 180;
        const lx = cx + (r * 0.68) * Math.cos(midAngle);
        const ly = cy + (r * 0.68) * Math.sin(midAngle);
        const seg = SEGMENTS[i];

        ctx.save();
        ctx.translate(lx, ly);
        ctx.rotate(midAngle + Math.PI / 2);

        // Pill background
        const pw = 44, ph = 18, pr = 5;
        ctx.fillStyle = 'rgba(0,0,0,0.28)';
        ctx.beginPath();
        ctx.roundRect(-pw/2, -ph/2, pw, ph, pr);
        ctx.fill();

        // Label text
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 3;
        ctx.fillText(seg.label, 0, 0);
        ctx.restore();
      }
      ctx.restore();

      ctx.restore();
    }

    // ---- Spin ----
    function spin() {
      if (spinning) return;
      spinning = true;
      document.getElementById('btn-spin').disabled = true;

      const winner = Math.floor(Math.random() * N);
      const extraSpins = 6 + Math.floor(Math.random() * 4);
      const targetDeg = extraSpins * 360 + (360 - winner * ARC - ARC / 2);
      const duration = 5000 + Math.random() * 1200;
      const startRot = rotation;
      const totalDelta = targetDeg;
      const startTime = performance.now();

      const ease = t => 1 - Math.pow(1 - t, 4.5);

      function frame(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        rotation = startRot + totalDelta * ease(t);
        draw(rotation % 360);

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          rotation = rotation % 360;
          spinning = false;
          const tries = getT(currentCode) + 1;
          setT(currentCode, tries);
          showResult(winner, tries);
        }
      }

      requestAnimationFrame(frame);
    }

    function showResult(winner, tries) {
      const seg = SEGMENTS[winner];
      document.getElementById('result-label').textContent = seg.label;
      document.getElementById('result-desc').textContent = seg.desc;
      document.getElementById('result-code').textContent = currentCode;

      const retryBtn = document.getElementById('btn-retry');
      retryBtn.style.display = tries < MAX ? '' : 'none';

      showView('v-result');
    }

    function retry() {
      const tries = getT(currentCode);
      if (tries >= MAX) {
        showView('v-block');
        return;
      }
      rotation = 0;
      spinning = false;
      initWheel(currentCode, tries);
      showView('v-wheel');
    }

    function backToLogin() {
      currentCode = "";
      document.getElementById('code-input').value = '';
      document.getElementById('btn-validate').disabled = true;
      document.getElementById('code-error').style.display = 'none';
      showView('v-login');
    }

    // Init
    showView('v-login');
  </script>

</body>
</html>
