<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Roue de la Fortune — Semilac Days 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/src/style.css"/>
</head>
<body>
<div class="aurora" aria-hidden="true">
  <div class="blob b1-rose" style="width:min(80vw,700px);height:min(80vw,700px);top:-20%;right:-15%;left:auto;"></div>
  <div class="blob b2-purple" style="width:min(70vw,650px);height:min(70vw,650px);bottom:-20%;left:-10%;top:auto;right:auto;"></div>
  <div class="blob b3" style="width:min(50vw,500px);height:min(50vw,500px);top:40%;left:40%;"></div>
</div>
<div class="grain" aria-hidden="true"></div>
<canvas id="pcv" style="position:fixed;inset:0;pointer-events:none;z-index:1;"></canvas>
<canvas id="ccv" style="position:fixed;inset:0;pointer-events:none;z-index:100;display:none;"></canvas>
<div class="topbar"><span>Semilac Days 2026 &nbsp;·&nbsp; Cosmotrend</span></div>

<main style="position:relative;z-index:2;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:90px 20px 80px;">
  <div style="text-align:center;margin-bottom:48px;animation:fuUp .8s ease both;">
    <p style="font-size:9px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:rgba(232,201,126,.42);margin-bottom:12px;">Semilac Days 2026</p>
    <h1 style="font-family:'Cormorant Garamond',serif;font-size:clamp(38px,7vw,58px);font-weight:300;color:#f5edd8;line-height:1.05;">
      Roue de la <em style="font-style:italic;background:linear-gradient(135deg,#c8902a,#e8c97e,#f7eabb);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">Fortune</em>
    </h1>
    <div style="width:120px;height:1px;margin:14px auto 0;background:linear-gradient(90deg,transparent,rgba(232,201,126,.35),transparent);"></div>
  </div>

  <div style="width:100%;max-width:460px;">

    <!-- LOGIN -->
    <div id="vl" class="glass" style="padding:44px 36px;text-align:center;animation:fuUp .9s .2s ease both;opacity:0;">
      <div style="width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,rgba(236,0,140,.14),rgba(236,0,140,.04));border:1px solid rgba(236,0,140,.22);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 0 30px rgba(236,0,140,.1);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ec008c" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </div>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:#f5edd8;margin-bottom:8px;">Entrez votre code billet</h2>
      <p style="font-size:12px;color:rgba(245,237,216,.36);margin-bottom:28px;letter-spacing:.04em;">Format &nbsp;·&nbsp; SD26-XXXX</p>
      <input id="ci" class="code-input" type="text" maxlength="9" placeholder="SD26-____" oninput="onci()"/>
      <p id="ce" style="display:none;font-size:11px;color:rgba(236,0,140,.7);margin-top:10px;"></p>
      <button id="bv" class="btn-g" style="width:100%;margin-top:20px;" onclick="validate()" disabled>
        Valider le code
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <!-- LOADING -->
    <div id="vload" style="display:none;text-align:center;padding:80px 0;">
      <div class="spin" style="margin:0 auto 20px;"></div>
      <p style="font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,237,216,.28);">Vérification…</p>
    </div>

    <!-- WHEEL -->
    <div id="vw" style="display:none;" class="glass">
      <div style="padding:32px 28px 36px;text-align:center;">
        <p id="wg" style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,237,216,.3);margin-bottom:10px;"></p>
        <div id="dots" style="display:flex;justify-content:center;gap:8px;margin-bottom:28px;"></div>
        <div style="position:relative;display:inline-block;margin-bottom:28px;">
          <div class="pointer"></div>
          <div class="wheel-glow"></div>
          <canvas id="wc" style="display:block;border-radius:50%;position:relative;z-index:2;"></canvas>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:6;width:48px;height:48px;border-radius:50%;background:radial-gradient(135deg,#2a0a50,#1a0530);border:2px solid rgba(232,201,126,.45);box-shadow:0 0 0 6px rgba(10,5,25,.8),0 0 20px rgba(232,201,126,.2);display:flex;align-items:center;justify-content:center;">
            <div style="width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,#e8c97e,#c8902a);box-shadow:0 0 10px rgba(232,201,126,.6);"></div>
          </div>
        </div>
        <button id="bs" class="btn-g" style="width:100%;font-size:13px;padding:17px 28px;" onclick="spin()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8l4 4-4 4"/></svg>
          Tourner la roue !
        </button>
      </div>
    </div>

    <!-- BLOCKED -->
    <div id="vb" style="display:none;" class="glass">
      <div style="padding:52px 36px;text-align:center;">
        <div style="width:64px;height:64px;border-radius:50%;background:rgba(236,0,140,.06);border:1px solid rgba(236,0,140,.18);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(236,0,140,.55)" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
        </div>
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:#f5edd8;margin-bottom:8px;">Limite atteinte</h2>
        <p style="font-size:13px;color:rgba(245,237,216,.38);line-height:1.8;margin-bottom:32px;">Ce billet a déjà utilisé ses 2 essais.<br>Bonne chance la prochaine fois !</p>
        <button class="btn-o" style="width:100%;" onclick="back()">Utiliser un autre billet</button>
      </div>
    </div>
  </div>

  <footer style="margin-top:60px;text-align:center;">
    <p style="font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,237,216,.1);">Cosmotrend · Casablanca · 2026</p>
  </footer>
</main>

<!-- RESULT OVERLAY -->
<div id="vr" style="display:none;" class="result-bg">
  <div style="width:100%;max-width:420px;animation:sIn .5s .1s ease both;opacity:0;animation-fill-mode:both;">
    <div class="glass" style="padding:52px 36px;text-align:center;position:relative;overflow:hidden;">
      <div style="position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:300px;height:300px;background:radial-gradient(ellipse,rgba(236,0,140,.18) 0%,transparent 70%);pointer-events:none;"></div>
      <div style="position:relative;width:150px;height:150px;margin:0 auto 28px;">
        <div style="position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(#c2006e,#ff3dab,#ec008c,#c2006e);opacity:.35;filter:blur(6px);"></div>
        <div style="width:150px;height:150px;border-radius:50%;background:linear-gradient(160deg,#1e0840,#2d1065,#1a0635);border:1.5px solid rgba(236,0,140,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;box-shadow:0 0 50px rgba(236,0,140,.25),inset 0 1px 0 rgba(255,255,255,.07);">
          <span id="rl" style="font-family:'Cormorant Garamond',serif;font-size:46px;font-weight:600;color:#fff;line-height:1;"></span>
          <span style="font-size:8px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:3px;">GAGNÉ</span>
        </div>
      </div>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;color:#f5edd8;margin-bottom:8px;">Félicitations !</h2>
      <p id="rd" style="font-size:14px;color:rgba(245,237,216,.55);margin-bottom:8px;"></p>
      <p id="rc" style="font-family:'Courier New',monospace;font-size:13px;font-weight:700;letter-spacing:.15em;color:#e8c97e;margin-bottom:32px;"></p>
      <div style="height:1px;background:linear-gradient(90deg,transparent,rgba(232,201,126,.2),transparent);margin-bottom:28px;"></div>
      <button id="br" class="btn-g" style="width:100%;margin-bottom:12px;display:none;" onclick="retry()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        2ème essai
      </button>
      <button class="btn-o" style="width:100%;font-size:11px;" onclick="back()">Utiliser un autre billet</button>
    </div>
  </div>
</div>

<script type="module">
  import { onci, validate, spin, retry, back } from '/src/wheel.js';
  window.onci=onci; window.validate=validate; window.spin=spin; window.retry=retry; window.back=back;
</script>
</body>
</html>
